name: Release

# auto-versioned releases driven by conventional-commit prefixes on main:
#   feat:                 -> minor   (0.x.0)
#   fix: / perf:          -> patch   (0.0.x)
#   feat!: / BREAKING CHANGE -> major (x.0.0)
#   docs/chore/test/build/refactor/ci/style -> no release
# a manual `git push origin vX.Y.Z` or the workflow_dispatch input also builds.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to release (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  version:
    # only auto-version on a push to main; tag pushes and dispatch skip straight
    # to release. tags created here use GITHUB_TOKEN, which does not re-trigger
    # the workflow, so there is no double run.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      new_tag: ${{ steps.version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          MSG=$(git log -1 --pretty=%B)
          SUBJECT=$(printf '%s' "$MSG" | head -1)

          if printf '%s' "$MSG" | grep -qE 'BREAKING CHANGE' || printf '%s' "$SUBJECT" | grep -qE '^[a-z]+(\(.+\))?!:'; then
            BUMP=major
          elif printf '%s' "$SUBJECT" | grep -qE '^feat(\(.+\))?:'; then
            BUMP=minor
          elif printf '%s' "$SUBJECT" | grep -qE '^(fix|perf)(\(.+\))?:'; then
            BUMP=patch
          else
            echo "no release-triggering prefix in: $SUBJECT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "bump: $BUMP"

          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)
          V=${LATEST#v}
          MAJOR=$(echo "$V" | cut -d. -f1)
          MINOR=$(echo "$V" | cut -d. -f2)
          PATCH=$(echo "$V" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="v${MAJOR}.${MINOR}.${PATCH}"

          if git rev-parse "$NEW" >/dev/null 2>&1; then
            echo "$NEW already exists, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "new_tag=$NEW" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

  release:
    needs: [version]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch' ||
       needs.version.outputs.should_release == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ needs.version.outputs.new_tag }}"
          fi
          [ -n "$TAG" ] || { echo "no tag to release"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: make dist VERSION="${{ steps.tag.outputs.tag }}"

      - name: Checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes
          fi

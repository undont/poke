# poke tmux integration
#
# the daemon writes incoming pokes to the peers file; this paints them in
# status-right, distinct from any agent/exit alert segment. `poke render` reads
# the file directly, so it works whether or not the CLI can reach the daemon.

# refresh often enough that a poke surfaces promptly
set -g status-interval 2

# append the poke segment to whatever status-right you already run
set -ga status-right "#(poke render)"

# acknowledge and clear all incoming pokes; every poke persists until you do
# this, whatever its urgency. pick any free prefix key; b/g/k are unused in the
# reference dotfiles
bind-key b run-shell "poke clear"

# optional: override the glyph if your font lacks the default bell
# set-environment -g POKE_ICON ""
